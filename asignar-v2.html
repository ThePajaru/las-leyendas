<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<title>Asignar Fotos — Las Leyendas</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#111;color:#eee;font-family:system-ui,sans-serif;display:flex;height:100vh;overflow:hidden}
/* LEFT: product grid */
#grid{width:320px;min-width:220px;overflow-y:auto;border-right:1px solid #333;background:#0a0a0a;padding:8px;flex-shrink:0}
#grid h2{font-size:12px;text-transform:uppercase;letter-spacing:2px;color:#666;padding:4px 0 8px}
.prod-thumb{display:inline-block;width:88px;margin:3px;cursor:pointer;border:2px solid transparent;border-radius:3px;overflow:hidden;position:relative;vertical-align:top}
.prod-thumb img{width:88px;height:88px;object-fit:cover;display:block}
.prod-thumb .pid{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.7);font-size:9px;padding:2px 3px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prod-thumb.active{border-color:#f0c040}
.prod-thumb.ok{border-color:#27ae60}
.prod-thumb.wrong{border-color:#e74c3c}
/* RIGHT: editor */
#editor{flex:1;display:flex;flex-direction:column;overflow:hidden}
#top-bar{padding:12px 16px;background:#161616;border-bottom:1px solid #333;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
#top-bar h1{font-size:14px;color:#f0c040;font-weight:700;flex:1}
#nav-btns{display:flex;gap:6px}
#nav-btns button{background:#222;border:1px solid #444;color:#eee;padding:5px 12px;cursor:pointer;font-size:12px;border-radius:3px}
#nav-btns button:hover{background:#333}
#editor-body{flex:1;display:flex;overflow:hidden}
/* Current photo + info */
#cur-panel{width:280px;padding:16px;border-right:1px solid #333;display:flex;flex-direction:column;gap:10px;overflow-y:auto;flex-shrink:0}
#cur-img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:4px;background:#222}
#cur-id{font-size:11px;color:#666}
#cur-name{font-size:13px;font-weight:600;color:#f0c040;line-height:1.4}
#name-edit{width:100%;background:#1a1a1a;border:1px solid #444;color:#eee;padding:6px 8px;font-size:12px;border-radius:3px}
.act-btns{display:flex;flex-direction:column;gap:6px}
.act-btns button{padding:7px;font-size:12px;border:none;border-radius:3px;cursor:pointer;font-weight:600}
#btn-ok{background:#27ae60;color:#fff}
#btn-ok:hover{background:#2ecc71}
#btn-wrong{background:#c0392b;color:#fff}
#btn-wrong:hover{background:#e74c3c}
#btn-skip{background:#333;color:#999}
#btn-skip:hover{background:#444}
/* Search panel */
#search-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:12px}
#search-bar{display:flex;gap:8px;margin-bottom:10px}
#search-input{flex:1;background:#1a1a1a;border:1px solid #444;color:#eee;padding:8px 12px;font-size:14px;border-radius:3px;outline:none}
#search-input:focus{border-color:#f0c040}
#search-count{font-size:11px;color:#666;align-self:center;white-space:nowrap}
#results{flex:1;overflow-y:auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;align-content:start}
.result-card{background:#1a1a1a;border:1px solid #333;border-radius:4px;cursor:pointer;overflow:hidden;transition:border-color .15s}
.result-card:hover{border-color:#f0c040}
.result-card img{width:100%;height:120px;object-fit:cover;display:block;background:#222}
.result-card .r-title{padding:5px 6px;font-size:10px;color:#ccc;line-height:1.3}
.result-card .r-hash{padding:0 6px 5px;font-size:9px;color:#555}
/* Progress bar */
#progress{padding:4px 16px;background:#0d0d0d;font-size:11px;color:#666;border-top:1px solid #2a2a2a;display:flex;gap:16px}
#progress span{color:#f0c040}
/* Export panel */
#export-area{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;display:none;align-items:center;justify-content:center}
#export-area.open{display:flex}
#export-box{background:#1a1a1a;border:1px solid #444;padding:20px;max-width:700px;width:90%;border-radius:6px}
#export-box h3{color:#f0c040;margin-bottom:10px;font-size:14px}
#export-text{width:100%;height:300px;background:#111;color:#9f9;font-family:monospace;font-size:11px;padding:10px;border:1px solid #333;border-radius:3px;resize:none}
#export-box .close-exp{background:#333;border:none;color:#eee;padding:6px 16px;cursor:pointer;border-radius:3px;margin-top:8px;font-size:12px}
</style>
</head>

<div id="grid">

        <button id="btn-skip" onclick="navigate(1)">Saltar →</button>

        Busca la camiseta correcta a la derecha. Al encontrarla, haz clic en ella para asignarla a este producto.
      </div>
    </div>
    <div id="search-panel">
      <div id="search-bar">
        <input id="search-input" type="text" placeholder="Busca: barcelona 98, real madrid, ajax..." oninput="doSearch(this.value)" autofocus/>
        <div id="search-count">0 resultados</div>
      </div>
      <div id="results"></div>
    </div>
  </div>
  <div id="progress">

  </div>
</div>

<div id="export-area">
  <div id="export-box">
    <h3>Script de correcciones — copia y ejecuta en Python</h3>
    <textarea id="export-text" readonly></textarea>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="close-exp" onclick="document.getElementById('export-area').classList.remove('open')">Cerrar</button>
      <button class="close-exp" style="background:#27ae60" onclick="copyExport()">📋 Copiar al portapapeles</button>
    </div>
  </div>
</div>

// State
let current = 0;
let state = JSON.parse(localStorage.getItem('asignar2_state') || '{}');
// state[id] = {status:'ok'|'wrong'|'skip', newImg:'hash', newName:'name'}

function save() { localStorage.setItem('asignar2_state', JSON.stringify(state)); updateProgress(); }

function getState(id) { return state[id] || {}; }

// Build grid
const gridEl = document.getElementById('grid-inner');
document.getElementById('g-count').textContent = PRODUCTS.length;
PRODUCTS.forEach((p,i) => {
  const d = document.createElement('div');
  d.className = 'prod-thumb';
  d.id = 'g-'+p.id;
  d.title = '#'+p.id+' '+p.name;
  d.innerHTML = `<img src="img/${p.img}.jpg" loading="lazy" onerror="this.style.background='#333';this.src=''"/><div class="pid">#${p.id}</div>`;
  d.onclick = () => { current = i; render(); d.scrollIntoView({block:'nearest'}); };
  gridEl.appendChild(d);
});

function render() {
  const p = PRODUCTS[current];
  const s = getState(p.id);
  // Update active state in grid
  document.querySelectorAll('.prod-thumb').forEach(el => el.classList.remove('active'));
  const gEl = document.getElementById('g-'+p.id);
  if(gEl) { gEl.classList.add('active'); gEl.scrollIntoView({block:'nearest'}); }
  // Main display
  const imgHash = s.newImg || p.img;
  const name = s.newName || p.name;
  document.getElementById('cur-img').src = 'img/' + imgHash + '.jpg';
  document.getElementById('cur-id').textContent = 'ID: ' + p.id + ' (' + (current+1) + '/' + PRODUCTS.length + ')';
  document.getElementById('cur-name').textContent = name;
  document.getElementById('name-edit').value = name;
  document.getElementById('top-title').textContent = '#'+p.id+' — '+name;
  // Status buttons
  document.getElementById('btn-ok').style.opacity = s.status === 'ok' ? '1' : '0.6';
  document.getElementById('btn-wrong').style.opacity = s.status === 'wrong' ? '1' : '0.6';
  // Pre-fill search with product name
  const q = name.replace(/\d{4}[-\/]\d{2,4}/g,'').trim().split(' ').slice(0,2).join(' ');
  document.getElementById('search-input').value = q;
  doSearch(q);
}

function markOk() {
  const p = PRODUCTS[current];
  const s = getState(p.id);
  s.status = 'ok';
  state[p.id] = s;
  save();
  const gEl = document.getElementById('g-'+p.id);
  if(gEl) { gEl.classList.remove('wrong'); gEl.classList.add('ok'); }
  render();
  setTimeout(() => navigate(1), 300);
}

function markWrong() {
  const p = PRODUCTS[current];
  const s = getState(p.id);
  s.status = 'wrong';
  state[p.id] = s;
  save();
  const gEl = document.getElementById('g-'+p.id);
  if(gEl) { gEl.classList.remove('ok'); gEl.classList.add('wrong'); }
  render();
}

function navigate(dir) {
  current = Math.max(0, Math.min(PRODUCTS.length-1, current + dir));
  render();
}

function doSearch(q) {
  const resultsEl = document.getElementById('results');
  if(!q || q.length < 2) { resultsEl.innerHTML = '<div style="color:#555;font-size:12px;padding:20px">Escribe al menos 2 caracteres para buscar...</div>'; document.getElementById('search-count').textContent = '0 resultados'; return; }
  const terms = q.toLowerCase().split(/\s+/).filter(t => t.length > 1);
  const matches = ALBUMS.filter(([title]) => {
    const t = title.toLowerCase();
    return terms.every(term => t.includes(term));
  }).slice(0,60);
  document.getElementById('search-count').textContent = matches.length + ' resultados';
  resultsEl.innerHTML = '';
  matches.forEach(([title, hash]) => {
    const c = document.createElement('div');
    c.className = 'result-card';
    const engTitle = title.replace(/.*?([A-Z].+)/, '$1').trim() || title;
    c.innerHTML = `
      <img src="https://photo.yupoo.com/classic-football-fhirts052/${hash}/small.jpg"
           referrerpolicy="no-referrer" loading="lazy"
           onerror="this.src='img/${hash}.jpg'" alt="${engTitle}"/>
      <div class="r-title">${engTitle}</div>
      <div class="r-hash">${hash}</div>`;
    c.onclick = () => assignAlbum(hash, extractName(title));
    resultsEl.appendChild(c);
  });
}

function extractName(title) {
  // Get the English part after Chinese text
  const m = title.match(/[A-Z][A-Za-z].*$/);
  return m ? m[0].trim() : title;
}

function assignAlbum(newHash, newName) {
  const p = PRODUCTS[current];
  const nameInput = document.getElementById('name-edit').value.trim() || newName;
  // Download the image locally if not already there
  state[p.id] = { status:'assigned', newImg: newHash, newName: nameInput, oldImg: p.img };
  save();
  // Update current product's img in display
  document.getElementById('cur-img').src = 'img/' + newHash + '.jpg';
  document.getElementById('cur-name').textContent = nameInput;
  document.getElementById('cur-img').onerror = function(){
    this.src = 'https://photo.yupoo.com/classic-football-fhirts052/'+newHash+'/medium.jpg';
  };
  const gEl = document.getElementById('g-'+p.id);
  if(gEl) { gEl.classList.add('ok'); gEl.querySelector('img').src = 'img/'+newHash+'.jpg'; }
  // Show confirmation
  document.getElementById('top-title').textContent = '✅ Asignado: #'+p.id+' → '+nameInput;
  setTimeout(() => navigate(1), 500);
}

function updateProgress() {
  let ok=0, wrong=0;
  PRODUCTS.forEach(p => {
    const s = getState(p.id);
    if(s.status === 'ok' || s.status === 'assigned') ok++;
    else if(s.status === 'wrong') wrong++;
    const gEl = document.getElementById('g-'+p.id);
    if(gEl) {
      gEl.classList.toggle('ok', s.status === 'ok' || s.status === 'assigned');
      gEl.classList.toggle('wrong', s.status === 'wrong');
    }
  });
  document.getElementById('p-ok').textContent = ok;
  document.getElementById('p-wrong').textContent = wrong;
  document.getElementById('p-total').textContent = PRODUCTS.length - ok - wrong;
}

function showExport() {
  const assignments = Object.entries(state).filter(([,s]) => s.newImg && s.newImg !== PRODUCTS.find(p=>p.id==+[...Object.keys(state)].find(k=>k==_))?.img );
  const changes = [];
  Object.entries(state).forEach(([id, s]) => {
    if(s.newImg || s.newName) {
      const p = PRODUCTS.find(p => p.id === +id);
      if(p) {
        const imgChanged = s.newImg && s.newImg !== p.img;
        const nameChanged = s.newName && s.newName !== p.name;
        if(imgChanged || nameChanged) {
          changes.push({id:+id, oldImg:p.img, newImg: s.newImg||p.img, oldName:p.name, newName: s.newName||p.name});
        }
      }
    }
  });

  let script = `#!/usr/bin/env python3
# Auto-generated correction script from asignar-v2.html
# Run: python apply_corrections.py
import re, os, ssl, urllib.request, time

HTML_FILE = "index.html"
IMG_FOLDER = "img"

CORRECTIONS = {
${changes.map(c => `  ${c.id}: {"img": "${c.newImg}", "name": "${c.newName}"},`).join('\n')}
}

ssl_ctx = ssl.create_default_context()
ssl_ctx.check_hostname = False
ssl_ctx.verify_mode = ssl.CERT_NONE
headers = {"User-Agent":"Mozilla/5.0","Referer":"https://www.yupoo.com/"}

with open(HTML_FILE, 'r', encoding='utf-8') as f:
    html = f.read()

for pid, corr in CORRECTIONS.items():
    new_hash = corr['img']
    new_name = corr['name']
    dest = os.path.join(IMG_FOLDER, new_hash + '.jpg')
    if not os.path.exists(dest) or os.path.getsize(dest) < 1000:
        url = f"https://photo.yupoo.com/classic-football-fhirts052/{new_hash}/medium.jpg"
        req = urllib.request.Request(url, headers=headers)
        try:
            with urllib.request.urlopen(req, timeout=20, context=ssl_ctx) as r:
                data = r.read()
            with open(dest, 'wb') as f: f.write(data)
            print(f"Downloaded {new_hash}.jpg")
            time.sleep(0.3)
        except Exception as e:
            print(f"ERROR downloading {new_hash}: {e}")
    p = re.compile(r'(\\{ id:' + str(pid) + r',[^\\n]*img:\\s*")[^"]*(")')
    html = p.sub(r'\\g<1>img/' + new_hash + r'.jpg\\g<2>', html)
    p2 = re.compile(r'(\\{ id:' + str(pid) + r',[^\\n]*name:\\s*")[^"]*(")')
    html = p2.sub(r'\\g<1>' + new_name.replace('\\\\','\\\\\\\\') + r'\\g<2>', html)
    print(f"Updated ID {pid}: {new_name}")

with open(HTML_FILE, 'w', encoding='utf-8') as f:
    f.write(html)
print(f"Done! {len(CORRECTIONS)} products updated.")
`;
  document.getElementById('export-text').value = script;
  document.getElementById('export-area').classList.add('open');
}

function copyExport() {
  navigator.clipboard.writeText(document.getElementById('export-text').value)
    .then(() => alert('Copiado al portapapeles!'));
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  if(e.target.tagName === 'INPUT') return;
  if(e.key === 'ArrowRight' || e.key === 'd') navigate(1);
  if(e.key === 'ArrowLeft' || e.key === 'a') navigate(-1);
  if(e.key === 'Enter') markOk();
  if(e.key === 'x') markWrong();
});

// Init
updateProgress();
render();
document.getElementById('search-input').focus();
</script>
